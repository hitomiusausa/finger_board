name: finger_board
description: "Finger Board — 特別支援教育向けインタラクティブ教材アプリ"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # 状態管理
  flutter_riverpod: ^2.5.1

  # ルーティング（Dart SDK 3.3.x 互換バージョン）
  go_router: ^13.2.3

  # ローカルDB（オフライン対応）
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.3

  # バックエンド（クラウド同期）
  supabase_flutter: ^2.12.0

  # TTS（音声読み上げ）
  flutter_tts: ^4.0.2

  # ファイル操作
  file_picker: ^8.1.2

  # SVG 表示（FBI 画像用）
  flutter_svg: ^2.0.10+1

  # ユーティリティ
  uuid: ^4.4.0
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
